version: '3.8'

services:
  # Neo4j - Knowledge Graph
  neo4j:
    image: neo4j:5.15
    container_name: reposentinel-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/reposentinel-dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reposentinel-net

  # Qdrant - Vector Database for Code Embeddings
  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: reposentinel-qdrant
    ports:
      - "6333:6333"  # REST
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    networks:
      - reposentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClickHouse - Time-Series for Health Metrics
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: reposentinel-clickhouse
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    environment:
      CLICKHOUSE_DB: reposentinel
      CLICKHOUSE_USER: reposentinel
      CLICKHOUSE_PASSWORD: reposentinel-dev
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - reposentinel-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache & Job Queue
  redis:
    image: redis:7.2-alpine
    container_name: reposentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - reposentinel-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Orchestrator - Multi-Agent System
  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    container_name: reposentinel-orchestrator
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: reposentinel-dev
      QDRANT_URL: http://qdrant:6333
      CLICKHOUSE_URL: http://reposentinel:reposentinel-dev@clickhouse:8123
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./services/orchestrator:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reposentinel-net

  # Brain Indexer - Code Parser
  brain-indexer:
    build:
      context: ./services/brain-indexer
      dockerfile: Dockerfile
    container_name: reposentinel-brain-indexer
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: reposentinel-dev
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./services/brain-indexer:/app
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - reposentinel-net

  # Dashboard - Mission Control UI
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: reposentinel-dashboard
    ports:
      - "3000:3000"
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: reposentinel-dev
      QDRANT_URL: http://qdrant:6333
      CLICKHOUSE_URL: http://reposentinel:reposentinel-dev@clickhouse:8123
      ORCHESTRATOR_URL: http://orchestrator:8080
    depends_on:
      - orchestrator
      - neo4j
      - qdrant
      - clickhouse
    networks:
      - reposentinel-net

volumes:
  neo4j_data:
  qdrant_data:
  clickhouse_data:
  redis_data:

networks:
  reposentinel-net:
    driver: bridge
